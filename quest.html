<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="quest.css">
</head>
<body>
  <div class="scanlines"></div>
  <div class="qwrap">
    <header class="qhead">
      <div>
        <div class="eyebrow">incoming</div>
        <h1 class="qtitle">QUEST LOG</h1>
      </div>
      <div class="qcount" id="qcount">0</div>
    </header>

    <div class="qlevel">
      <span class="eyebrow">LV <b id="q-lvl">1</b></span>
      <div class="xp-track"><div class="xp-fill" id="q-xp"></div></div>
      <span class="eyebrow" id="q-streak">🔥 0</span>
    </div>

    <main id="qlist" class="qlist"></main>

    <div id="qvictory" class="qvictory" hidden>
      <div class="qvictory-mark">🏆</div>
      <div class="qvictory-title">เคลียร์ครบทุก quest</div>
      <div class="qvictory-sub" id="qvictory-sub"></div>
      <button class="qclose" id="qclose">ปิดหน้าต่าง</button>
    </div>
  </div>

  <script type="module" src="quest.js"></script>
</body>
</html>
