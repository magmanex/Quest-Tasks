<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="page">
    <header class="phead">
      <span class="brand-mark">🎯</span>
      <div>
        <h1>Quest Tasks</h1>
        <div class="eyebrow">ตั้งค่าและเชื่อมต่อ Notion</div>
      </div>
    </header>

    <!-- STEP 1: token -->
    <section class="block">
      <div class="block-num">1</div>
      <div class="block-body">
        <h2>เชื่อมต่อ Notion</h2>
        <p class="muted">
          สร้าง Internal Integration ที่
          <a href="https://www.notion.so/my-integrations" target="_blank" rel="noopener">notion.so/my-integrations</a>
          แล้วเปิด capability ให้ครบทั้ง <b>Read</b>, <b>Update</b>, <b>Insert</b> จากนั้นคัดลอก token มาวาง
        </p>
        <div class="row">
          <input id="token" type="password" placeholder="ntn_..." autocomplete="off">
          <button id="test-btn" class="btn">ทดสอบ</button>
        </div>
        <div id="token-status" class="status"></div>

        <!-- ไปหน้า migrate (จัดการ quest/reading database แยกหน้าต่างหาก) -->
        <div class="row" id="migrate-nav" hidden style="margin-top:10px;">
          <a id="goto-migrate" class="btn primary" href="../migrate/migrate.html">ไปหน้าจัดการ database →</a>
        </div>
      </div>
    </section>

    <!-- STEP 2: settings -->
    <section class="block" id="step3" data-locked="true">
      <div class="block-num">2</div>
      <div class="block-body">
        <h2>การเตือน</h2>
        <label class="field">
          <span>เช็คงานทุก ๆ (นาที)</span>
          <input id="interval" type="number" min="15" step="5" value="60">
        </label>
        <label class="field checkbox">
          <input id="auto-open" type="checkbox" checked>
          <span>เด้งหน้าต่าง quest อัตโนมัติเมื่อมีงานถึงกำหนด</span>
        </label>
        <label class="field checkbox">
          <input id="quiet-enabled" type="checkbox" checked>
          <span>ช่วงเวลาเงียบ (ไม่เด้ง popup)</span>
        </label>
        <div class="row quiet-row">
          <input id="quiet-start" type="time" value="22:00">
          <span class="muted">ถึง</span>
          <input id="quiet-end" type="time" value="07:00">
        </div>
        <button id="save-settings" class="btn">บันทึกการตั้งค่า</button>
        <div id="settings-status" class="status"></div>
      </div>
    </section>

    <!-- danger zone -->
    <div class="summary-actions" style="justify-content: flex-end; border-top: none; margin-top: 4px;">
      <button id="reset" class="link danger">ล้างการตั้งค่าทั้งหมด</button>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
