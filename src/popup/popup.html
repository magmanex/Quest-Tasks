<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="syncbar" id="syncbar"></div>
  <div class="wrap">
    <header class="appbar">
      <div class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/>
            <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <div>
          <div class="brand-name">Quest Tasks</div>
          <div class="eyebrow" id="today-label"></div>
        </div>
      </div>
      <div class="appbar-actions">
        <button class="lvl" id="lvl-badge" title="ดูความคืบหน้า">
          <span class="lvl-num" id="lvl-num">1</span>
          <span class="lvl-cap">LV</span>
        </button>
        <button id="refresh" class="icon-btn" aria-label="รีเฟรช" title="รีเฟรช">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/>
          </svg>
        </button>
        <button id="open-options" class="icon-btn" aria-label="ตั้งค่า" title="ตั้งค่า">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ===== Quest tab ===== -->
    <section id="view-quest" class="view">
      <div class="topbar">
        <div class="xp-row">
          <div class="xp-track"><div class="xp-fill" id="xp-fill"></div></div>
          <div class="xp-meta">
            <span id="xp-text">0 / 100 XP</span>
            <span id="streak-text">
              <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2s5 4 5 9a5 5 0 0 1-10 0c0-2 1-3.6 2.6-5C10 7.5 11 4.5 12 2z"/>
              </svg>
              <span id="streak-num">0</span> วัน
            </span>
          </div>
        </div>

        <!-- ช่องเพิ่ม quest เร็ว -->
        <div class="quick" id="quick-row">
          <input id="quick-input" type="text" autocomplete="off"
                 placeholder="เพิ่มงาน… เช่น ประชุมพรุ่งนี้ 14.00">
          <button id="quick-add" class="quick-btn">เพิ่ม</button>
        </div>
        <div class="quick-hint" id="quick-hint"></div>
      </div>

      <!-- รายการงานถึงกำหนด -->
      <main id="list" class="list"></main>

      <!-- รายการล่วงหน้า (พรุ่งนี้ → +3 วัน) -->
      <section class="upcoming" id="upcoming" hidden>
        <div class="up-body" id="up-body"></div>
      </section>
    </section>

    <!-- ===== อ่านทีหลัง tab ===== -->
    <section id="view-reading" class="view" hidden>
      <div class="topbar">
        <div class="quick">
          <input id="reading-quick-title" type="text" autocomplete="off" placeholder="ชื่อเรื่อง">
          <button id="reading-quick-add" class="quick-btn">เพิ่ม</button>
        </div>
        <input id="reading-quick-url" type="text" autocomplete="off"
               class="reading-url-input" placeholder="ลิงก์ (ไม่ใส่ก็ได้)">
      </div>
      <main id="reading-list" class="list"></main>
    </section>
  </div>

  <!-- สลับเมนูแบบ bottom nav — icon-only เหมือน mobile app -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="quest" aria-label="Quest" title="Quest">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </span>
    </button>
    <button class="nav-btn" data-view="reading" aria-label="อ่านทีหลัง" title="อ่านทีหลัง">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 6c-2-1.4-5-1.4-7 0v12c2-1.4 5-1.4 7 0 2-1.4 5-1.4 7 0V6c-2-1.4-5-1.4-7 0z"/>
          <path d="M12 6v12"/>
        </svg>
      </span>
    </button>
  </nav>

  <script type="module" src="popup.js"></script>
</body>
</html>
